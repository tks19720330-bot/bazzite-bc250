---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: bazzite-bc250
description: Bazzite with nct6687
base-image: ghcr.io/ublue-os/bazzite
image-version: stable

modules:
  - type: dnf
    install:
      packages:
        - gcc
        - make
        - git
        - kernel-devel-matched

  - type: script
    snippets:
      - |
        set -euxo pipefail

        cd /tmp

        git clone https://github.com/Fred78290/nct6687d.git
        cd nct6687d

        KERNEL_DIR=$(find /usr/src/kernels -maxdepth 1 -type d | tail -n 1)
        KERNEL_VERSION=$(basename "${KERNEL_DIR}")

        export KERNELRELEASE="${KERNEL_VERSION}"
        export KDIR="${KERNEL_DIR}"

        sed -i "s/uname -r/echo ${KERNEL_VERSION}/g" Makefile || true

        make

        mkdir -p /usr/lib/modules/${KERNEL_VERSION}/extra

        cp $(find . -name '*.ko' | head -n 1) \
          /usr/lib/modules/${KERNEL_VERSION}/extra/nct6687.ko

        depmod -a "${KERNEL_VERSION}"

        cat >/etc/modules-load.d/nct6687.conf <<EOF
        nct6687
        EOF

        cat >/etc/modprobe.d/nct6687.conf <<EOF
        options nct6687 fan_config=msi_alt1
        EOF
