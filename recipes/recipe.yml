modules:
  - type: dnf
    install:
      - gcc
      - make
      - kernel-devel
      - git

  - type: script
    snippets:
      - |
        set -euxo pipefail

        cd /tmp

        git clone https://github.com/Fred78290/nct6687d.git
        cd nct6687d

        KERNEL_DIR=$(find /usr/src/kernels -maxdepth 1 -type d | tail -n 1)
        KERNEL_VERSION=$(basename "${KERNEL_DIR}")

        sed -i "s|/lib/modules/\$(shell uname -r)/build|${KERNEL_DIR}|g" Makefile

        make

        mkdir -p /usr/lib/modules/${KERNEL_VERSION}/extra

        cp nct6687.ko /usr/lib/modules/${KERNEL_VERSION}/extra/

        depmod -a ${KERNEL_VERSION}

        cat >/etc/modules-load.d/nct6687.conf <<EOF
        nct6687
        EOF

        cat >/etc/modprobe.d/nct6687.conf <<EOF
        options nct6687 fan_config=msi_alt1
        EOF
