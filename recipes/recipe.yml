name: bazzite-bc250
description: Custom Bazzite image for AMD BC-250 with aic8800 and nct6687 drivers.
base-image: ghcr.io/ublue-os/bazzite
image-version: stable

modules:
  - type: rpm-ostree
    install:
      - git
      - make
      - gcc
      - gcc-c++
      - rpm-build
      - rpmdevtools
      - akmods
      - kmodtool
      - kernel-devel-matched
      - kernel-headers
      - lm_sensors

  - type: script
    snippets:
      - |
        set -euxo pipefail
  
        cd /tmp
  
        git clone https://github.com/Fred78290/nct6687d.git
        cd nct6687d
  
        mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
  
        cp kmod-nct6687.spec ~/rpmbuild/SPECS/
  
        tar czf ~/rpmbuild/SOURCES/nct6687d.tar.gz .
  
        rpmbuild -ba ~/rpmbuild/SPECS/kmod-nct6687.spec
  
        find ~/rpmbuild/RPMS -name "*.rpm"
  
        dnf install -y ~/rpmbuild/RPMS/*/*.rpm
  
        cat >/etc/modules-load.d/nct6687d.conf <<EOF
        nct6687
        EOF
  
        cat >/etc/modprobe.d/nct6687d.conf <<EOF
        options nct6687 fan_config=msi_alt1
        EOF
